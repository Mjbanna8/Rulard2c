<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Het Marketing — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --cream: #f5f0e8;
      --dark: #0a0a0a;
      --dark-2: #111111;
      --dark-3: #1a1a1a;
      --text-muted: rgba(245,240,232,0.45);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── RADIAL GLOW ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vw;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── DECORATIVE LINES ── */
    .line-left, .line-right {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.2) 30%, rgba(201,168,76,0.2) 70%, transparent);
      z-index: 1;
    }
    .line-left  { left: 7vw; }
    .line-right { right: 7vw; }

    .line-top, .line-bottom {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2) 30%, rgba(201,168,76,0.2) 70%, transparent);
      z-index: 1;
    }
    .line-top    { top: 6vh; }
    .line-bottom { bottom: 6vh; }

    /* ── CORNER ORNAMENTS ── */
    .corner {
      position: fixed;
      width: 32px; height: 32px;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: calc(6vh - 16px); left: calc(7vw - 16px); }
    .corner.tr { top: calc(6vh - 16px); right: calc(7vw - 16px); }
    .corner.bl { bottom: calc(6vh - 16px); left: calc(7vw - 16px); }
    .corner.br { bottom: calc(6vh - 16px); right: calc(7vw - 16px); }
    .corner.tr svg { transform: rotate(90deg); }
    .corner.br svg { transform: rotate(180deg); }
    .corner.bl svg { transform: rotate(270deg); }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 2rem;
      text-align: center;
    }

    /* ── TOP LABEL ── */
    .label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: slideDown 1s ease 0.3s forwards;
      margin-bottom: 2rem;
    }

    /* ── ORNAMENT LINE ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }
    .ornament-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .ornament-line.rev {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* ── MAIN HEADING ── */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 7.5rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--cream);
      opacity: 0;
      animation: slideUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
      margin-bottom: 0.15em;
    }
    .brand span {
      color: var(--gold);
      font-style: italic;
    }

    .domain {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      letter-spacing: 0.35em;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeIn 1s ease 1.1s forwards;
      margin-bottom: 3rem;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      letter-spacing: 0.05em;
      color: rgba(245,240,232,0.6);
      opacity: 0;
      animation: fadeIn 1s ease 1.3s forwards;
      margin-bottom: 4rem;
      max-width: 520px;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }
    .divider-line {
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.5));
    }
    .divider-line.rev {
      background: linear-gradient(to left, transparent, rgba(201,168,76,0.5));
    }
    .divider svg { color: var(--gold); }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      gap: clamp(1.5rem, 4vw, 3.5rem);
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: slideUp 1s ease 1.6s forwards;
    }
    .time-block { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }

    .time-number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1;
      color: var(--cream);
      min-width: 2ch;
      position: relative;
    }
    .time-number::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    }

    .time-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.5rem, 1vw, 0.65rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      padding-top: 0.5rem;
    }

    .time-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      color: var(--gold-dim);
      line-height: 1;
      align-self: flex-start;
      padding-top: 0.15em;
    }

    /* ── BOTTOM NOTE ── */
    .note {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }
    .note a {
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .note a:hover { opacity: 0.7; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FLOATING PARTICLES ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .line-left  { left: 4vw; }
      .line-right { right: 4vw; }
      .line-top    { top: 4vh; }
      .line-bottom { bottom: 4vh; }

      .corner.tl { top: calc(4vh - 16px); left: calc(4vw - 16px); }
      .corner.tr { top: calc(4vh - 16px); right: calc(4vw - 16px); }
      .corner.bl { bottom: calc(4vh - 16px); left: calc(4vw - 16px); }
      .corner.br { bottom: calc(4vh - 16px); right: calc(4vw - 16px); }

      .countdown { gap: clamp(0.5rem, 2vw, 1.5rem); }
      .time-number { font-size: clamp(2rem, 8vw, 2.8rem); }
      .time-sep { font-size: clamp(1.5rem, 6vw, 2rem); }
    }
  </style>
</head>
<body>

  <!-- Frame lines -->
  <div class="line-left"></div>
  <div class="line-right"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 30 L2 2 L30 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 30 L2 2 L30 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 30 L2 2 L30 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 30 L2 2 L30 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
  </div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Main content -->
  <div class="wrapper">

    <div class="label">Exclusive Launch</div>

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line rev"></div>
    </div>

    <h1 class="brand">Het<span>Marketing</span></h1>
    <p class="domain">hetmarketing.tech</p>

    <p class="tagline">Where strategy meets sophistication. Something extraordinary is on its way.</p>
    <p class="tagline">🙏 JAY MATAJI 🙏</p>


    <div class="divider">
      <div class="divider-line"></div>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="6" y="0" width="2" height="14" fill="#c9a84c" opacity="0.6"/>
        <rect x="0" y="6" width="14" height="2" fill="#c9a84c" opacity="0.6"/>
        <rect x="4" y="4" width="6" height="6" fill="#c9a84c" opacity="0.3" transform="rotate(45 7 7)"/>
      </svg>
      <div class="divider-line rev"></div>
    </div>

    <div class="countdown" id="countdown">
      <div class="time-block">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-number" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-number" id="seconds">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>

    <div class="note">
      Inquiries &nbsp;·&nbsp; <a href="mailto:mouryrajjadeja@gmail.com">mouryrajjadeja@gmail.com</a><br>
      
      Inquiries &nbsp;·&nbsp; <a href="mailto:asjadeja44897@gmail.com">asjadeja44897@gmail.com</a>
    </div>

  </div>

  <script>
    // ── Countdown ──
    const launch = new Date();
    launch.setDate(launch.getDate() + 30);

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = launch - Date.now();
      if (diff <= 0) {
        document.getElementById('days').textContent    = '00';
        document.getElementById('hours').textContent   = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);
      document.getElementById('days').textContent    = pad(d);
      document.getElementById('hours').textContent   = pad(h);
      document.getElementById('minutes').textContent = pad(m);
      document.getElementById('seconds').textContent = pad(s);
    }
    tick();
    setInterval(tick, 1000);

    // ── Particles ──
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left     = Math.random() * 100 + 'vw';
      p.style.animationDuration  = (8 + Math.random() * 14) + 's';
      p.style.animationDelay     = (Math.random() * 12) + 's';
      p.style.width  = (Math.random() > 0.6 ? 3 : 2) + 'px';
      p.style.height = p.style.width;
      container.appendChild(p);
    }
  </script>
</body>
</html>
