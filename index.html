<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon — Het Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --ink: #1a1814;
      --muted: #8a8680;
      --accent: #c8a96e;
      --border: #dedad4;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(2rem, 6vw, 5rem);
    }

    /* Top label */
    .label {
      position: absolute;
      top: clamp(1.5rem, 4vw, 3rem);
      left: clamp(2rem, 6vw, 5rem);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .label span {
      color: var(--accent);
    }

    /* Decorative line */
    .line-top {
      position: absolute;
      top: clamp(1.5rem, 4vw, 3rem);
      right: clamp(2rem, 6vw, 5rem);
      width: 60px;
      height: 1px;
      background: var(--accent);
      transform-origin: right;
      transform: scaleX(0);
      animation: lineIn 0.8s ease 0.4s forwards;
    }

    /* Main content center */
    .main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 2rem;
      max-width: 720px;
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      line-height: 0.95;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1s ease 0.65s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      line-height: 1.7;
      max-width: 340px;
      border-left: 1px solid var(--accent);
      padding-left: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.85s forwards;
    }

    /* Email form */
    .notify-form {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 380px;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.05s forwards;
    }

    .notify-form input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-right: none;
      padding: 0.75rem 1rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--ink);
      outline: none;
      transition: border-color 0.3s;
    }

    .notify-form input::placeholder {
      color: var(--muted);
    }

    .notify-form input:focus {
      border-color: var(--accent);
    }

    .notify-form button {
      background: var(--ink);
      color: var(--bg);
      border: 1px solid var(--ink);
      padding: 0.75rem 1.25rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      white-space: nowrap;
    }

    .notify-form button:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--ink);
    }

    .success-msg {
      display: none;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-top: -1rem;
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.3s forwards;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-domain {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .footer-domain span {
      color: var(--accent);
    }

    /* Big decorative watermark */
    .watermark {
      position: fixed;
      bottom: -4vw;
      right: -2vw;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(8rem, 22vw, 20rem);
      color: transparent;
      -webkit-text-stroke: 1px var(--border);
      pointer-events: none;
      user-select: none;
      line-height: 1;
      opacity: 0;
      animation: fadeIn 1.2s ease 1.5s forwards;
      z-index: 0;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes lineIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="label">hetmarketing<span>.tech</span></div>
    <div class="line-top"></div>

    <main class="main">
      <p class="eyebrow">Something is coming</p>
      <h1>Het<br><em>Marketing</em></h1>
      <p class="tagline">
        We're crafting something thoughtful.<br>
        Be the first to know when we launch.
      </p>
      <div class="notify-form">
        <input type="email" id="emailInput" placeholder="your@email.com" />
        <button onclick="handleNotify()">Notify me</button>
      </div>
      <p class="success-msg" id="successMsg">✓ You're on the list. We'll be in touch.</p>
    </main>

    <footer class="footer">
      <span class="footer-brand">Het Marketing</span>
      <span class="footer-domain">hetmarketing<span>.tech</span></span>
    </footer>
  </div>

  <div class="watermark">HM</div>

  <script>
    function handleNotify() {
      const input = document.getElementById('emailInput');
      const msg = document.getElementById('successMsg');
      const val = input.value.trim();
      if (!val || !val.includes('@')) {
        input.style.borderColor = '#c0392b';
        setTimeout(() => input.style.borderColor = '', 1200);
        return;
      }
      document.querySelector('.notify-form').style.display = 'none';
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
